# Turkey / EMEA Portal Scanner Configuration
# Used by /career-ops scan to discover new offers for Turkey-based candidates.
#
# This starter is locale-aware, not persona-aware:
# - It is tuned for the Turkey market and common Turkey/EMEA boards
# - It is NOT a fixed default role pack
# - You are expected to customize keywords, searches, and tracked companies
#
# Compatibility:
# - Keeps the same top-level structure as templates/portals.example.yml
# - Existing scanner keys remain: title_filter, search_queries, tracked_companies
# - Extra metadata keys below are additive and safe for current scanner implementations to ignore
#
# Strategy:
#   1. Company career pages in Turkey or Turkey-founded employers
#   2. Global ATS providers used by Turkey / EMEA employers
#   3. Turkish job boards via WebSearch site: queries

title_filter:
  positive:
    # [CUSTOMIZE] Keep only the role families you care about.
    # -- Software / backend / platform --
    - "Software Engineer"
    - "Backend Engineer"
    - "Platform Engineer"
    - "Full Stack"
    - "DevOps"
    - "SRE"
    - "Site Reliability"
    - "QA"
    - "Test Automation"
    - "Mobile"
    - "Android"
    - "iOS"
    - "ERP Destek"
    - "Mikro ERP"
    # -- Data / analytics --
    - "Data Engineer"
    - "Data Analyst"
    - "Analytics Engineer"
    - "Business Intelligence"
    - "BI"
    # -- Product / design / customer-facing technical --
    - "Product Manager"
    - "Project Manager"
    - "Product Designer"
    - "UX Designer"
    - "UI Designer"
    - "Solutions Engineer"
    - "Solutions Architect"
    - "Implementation"
    - "Customer Success Engineer"
    # -- Common Turkish equivalents --
    - "Yazilim Muhendisi"
    - "Yazılım Mühendisi"
    - "Arka Uc"
    - "Arka Uç"
    - "Veri Muhendisi"
    - "Veri Mühendisi"
    - "Urun Yonetici"
    - "Ürün Yöneticisi"
    - "Tasarimci"
    - "Tasarımcı"
    - "Kalite"
  negative:
    # [CUSTOMIZE] Add exclusions for roles you do not want.
    - "Stajyer"
    - "Intern"
    - "Çağrı Merkezi"
    - "Müşteri Temsilcisi"
    - "Satış Temsilcisi"
    - "Saha Satış"
    - "Web Master"
    - "Webmaster"
    - "Web Tasarım"
    - "Web Tasarımcı"
    - "UI UX"
    - "UI/UX"
    - "Bilgisayar Mühendisi"
    - "Bilgisayar Programcısı"
    - "Muhasebe"
    - "Ön Muhasebe"
    - "Kasiyer"
    - "Mağaza"
    - "Security Guard"
    - "Forklift"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Staff"
    - "Uzman"
    - "Kıdemli"
    - "Müdür"

search_queries:
  # -- Primary Turkey discovery sources --
  - name: LinkedIn Jobs — Turkey Software & Product
    adapter_family: turkish_job_board
    parser_key: linkedin_jobs_search
    locale: en-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "linkedin"
      normalize_company_from_result: true
      prefer_company_page_over_job_board: true
      strip_title_suffixes: ["LinkedIn", "Istanbul", "İstanbul", "Hybrid", "Hibrit", "Remote", "Uzaktan", "Türkiye", "Turkey"]
    query: 'site:linkedin.com/jobs/view "Turkey" OR "Türkiye" "Software Engineer" OR "Backend Engineer" OR "Product Manager" OR "QA Engineer"'
    enabled: true

  - name: Kariyer.net — Software & Product
    adapter_family: turkish_job_board
    parser_key: kariyernet_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      param: cp
      max_pages: 5
    search_urls:
      - "https://www.kariyer.net/is-ilanlari?kw=yaz%C4%B1l%C4%B1m"
      - "https://www.kariyer.net/is-ilanlari?kw=backend"
      - "https://www.kariyer.net/is-ilanlari?kw=product"
      - "https://www.kariyer.net/is-ilanlari/yazilim%2Bmuhendisi"
      - "https://www.kariyer.net/is-ilanlari/software%2Bdeveloper"
    anti_duplication:
      canonical_source: "kariyer.net"
      normalize_company_from_result: true
      strip_title_suffixes: ["İstanbul", "Ankara", "Hybrid", "Hibrit", "Remote", "Uzaktan"]
    query: 'site:kariyer.net/is-ilanlari "Yazılım Mühendisi" OR "Backend Engineer" OR "Product Manager" OR "Ürün Yöneticisi"'
    enabled: true

  - name: Kariyer.net — Platform, Data & Design
    adapter_family: turkish_job_board
    parser_key: kariyernet_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      param: cp
      max_pages: 5
    search_urls:
      - "https://www.kariyer.net/is-ilanlari?kw=platform"
      - "https://www.kariyer.net/is-ilanlari?kw=veri"
      - "https://www.kariyer.net/is-ilanlari?kw=analytics"
      - "https://www.kariyer.net/is-ilanlari?kw=ux"
      - "https://www.kariyer.net/is-ilanlari?kw=qa"
      - "https://www.kariyer.net/is-ilanlari/veri%2Bmuhendisi"
      - "https://www.kariyer.net/is-ilanlari/platform%2Bmuhendisi"
    anti_duplication:
      canonical_source: "kariyer.net"
      normalize_company_from_result: true
      prefer_url_job_id: true
    query: 'site:kariyer.net/is-ilanlari "Platform Engineer" OR "Data Engineer" OR "Analytics" OR "UX Designer" OR "QA"'
    enabled: true

  - name: Indeed Türkiye — Tech Roles
    adapter_family: turkish_job_board
    parser_key: indeed_tr_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      max_pages: 3
    search_urls:
      - "https://tr.indeed.com/jobs?q=software+developer&l=T%C3%BCrkiye"
      - "https://tr.indeed.com/jobs?q=backend+developer&l=T%C3%BCrkiye"
      - "https://tr.indeed.com/jobs?q=data+engineer&l=T%C3%BCrkiye"
      - "https://tr.indeed.com/jobs?q=qa+engineer&l=T%C3%BCrkiye"
    anti_duplication:
      canonical_source: "indeed"
      normalize_company_from_result: true
      strip_title_suffixes: ["İstanbul", "Ankara", "Hybrid", "Hibrit", "Remote", "Uzaktan", "Turkey", "Türkiye"]
    query: 'site:tr.indeed.com OR site:indeed.com/q "Türkiye" OR "Turkey" "Software Engineer" OR "Data Engineer" OR "QA Engineer" OR "Product Manager"'
    enabled: true

  - name: Eleman.net — Tech Roles
    adapter_family: turkish_job_board
    parser_key: elemannet_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      param: sy
      max_pages: 5
    search_urls:
      - "https://www.eleman.net/is-ilanlari?aranan=yaz%C4%B1l%C4%B1m&arandi=e&sehir=&ilce="
      - "https://www.eleman.net/is-ilanlari?aranan=backend&arandi=e&sehir=&ilce="
      - "https://www.eleman.net/is-ilanlari?aranan=veri&arandi=e&sehir=&ilce="
      - "https://www.eleman.net/is-ilanlari?aranan=qa&arandi=e&sehir=&ilce="
      - "https://www.eleman.net/is-ilanlari?aranan=product&arandi=e&sehir=&ilce="
    anti_duplication:
      canonical_source: "eleman.net"
      normalize_company_from_result: true
      strip_title_suffixes: ["İstanbul", "Ankara", "Hybrid", "Hibrit", "Remote", "Uzaktan"]
    query: 'site:eleman.net/is-ilanlari "Yazılım Mühendisi" OR "Backend Engineer" OR "Veri Mühendisi" OR "QA" OR "Product Manager"'
    enabled: true

  # -- Secondary Turkey discovery sources --
  - name: Secretcv — Tech Roles
    adapter_family: turkish_job_board
    parser_key: secretcv_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      max_pages: 3
    search_urls:
      - "https://www.secretcv.com/is-ilanlari/yazilim-gelistirici-is-ilanlari"
      - "https://www.secretcv.com/is-ilanlari/software-developer-is-ilanlari"
      - "https://www.secretcv.com/is-ilanlari/veri-muhendisi-is-ilanlari"
      - "https://www.secretcv.com/is-ilanlari/qa-engineer-is-ilanlari"
    anti_duplication:
      canonical_source: "secretcv"
      normalize_company_from_result: true
    query: 'site:secretcv.com/is-ilanlari "Software Engineer" OR "Backend Engineer" OR "Product Manager" OR "Data Engineer"'
    enabled: true

  - name: Yenibiris — Tech Roles
    adapter_family: turkish_job_board
    parser_key: yenibiris_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      max_pages: 3
    search_urls:
      - "https://www.yenibiris.com/is-ilanlari/yazilim-gelistirici"
      - "https://www.yenibiris.com/is-ilanlari/software-developer"
      - "https://www.yenibiris.com/is-ilanlari/veri-muhendisi"
      - "https://www.yenibiris.com/is-ilanlari/qa-engineer"
    anti_duplication:
      canonical_source: "yenibiris"
      normalize_company_from_result: true
    query: 'site:yenibiris.com/is-ilanlari "Yazılım Mühendisi" OR "Ürün Yöneticisi" OR "Veri Analisti" OR "UX Designer"'
    enabled: true

  - name: İŞKUR — Tech Roles
    adapter_family: turkish_job_board
    parser_key: iskur_search
    locale: tr-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "iskur"
      normalize_company_from_result: true
      strip_title_suffixes: ["İstanbul", "Ankara", "Hybrid", "Hibrit", "Remote", "Uzaktan"]
    query: 'site:esube.iskur.gov.tr OR site:iskur.gov.tr "Yazılım" OR "Veri" OR "QA" OR "Tasarım" OR "Ürün"'
    enabled: true

  - name: Bilişim Vadisi Kariyer — Tech Roles
    adapter_family: turkish_job_board
    parser_key: custom_careers_hub
    locale: tr-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "bilisim-vadisi-kariyer"
      normalize_company_from_result: true
      strip_title_suffixes: ["Kocaeli", "İstanbul", "Izmir", "Türkiye", "Turkey"]
    query: 'site:kariyer.bilisimvadisi.com.tr/job-ad "Software Engineer" OR "Software Developer" OR "Backend Engineer" OR "Platform Engineer" OR "Data Engineer" OR "Yazılım Mühendisi" OR "Yazılım Uzmanı" OR "Ürün Yöneticisi"'
    enabled: true

  - name: Techcareer.net — Tech Roles
    adapter_family: turkish_job_board
    parser_key: techcareer_search
    locale: tr-TR
    language: [tr, en]
    pagination:
      param: "jobs[page]"
      max_pages: 5
    search_urls:
      - "https://www.techcareer.net/en/jobs?keyword=software"
      - "https://www.techcareer.net/en/jobs?keyword=backend"
      - "https://www.techcareer.net/en/jobs?keyword=java"
      - "https://www.techcareer.net/en/jobs?keyword=data"
      - "https://www.techcareer.net/en/jobs?keyword=qa"
    anti_duplication:
      canonical_source: "techcareer"
      normalize_company_from_result: true
      strip_title_suffixes: ["İstanbul", "Istanbul", "Ankara", "Türkiye", "Turkey", "Hybrid", "Hibrit", "Remote", "Uzaktan"]
    query: 'site:techcareer.net/jobs/detail "Software Engineer" OR "Backend Developer" OR "Data Engineer" OR "Yazılım Geliştirici" OR "Yazılım Mühendisi"'
    enabled: true

  - name: Youthall — New Grad Product & Tech
    adapter_family: turkish_job_board
    parser_key: youthall_search
    locale: tr-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "youthall"
      normalize_company_from_result: true
    query: 'site:youthall.com "Software" OR "Data" OR "Product" OR "Design" "Intern" OR "New Grad"'
    enabled: false

  # -- Global ATS providers commonly used by Turkey / EMEA employers --
  - name: Greenhouse — Turkey / EMEA Tech
    adapter_family: global_ats
    parser_key: greenhouse_board
    locale: en-EMEA
    language: [en]
    anti_duplication:
      canonical_source: "greenhouse"
      prefer_url_job_id: true
      strip_title_suffixes: ["Remote", "Hybrid", "EMEA", "Turkey", "Türkiye"]
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io "Software Engineer" OR "Backend Engineer" OR "Product Manager" "EMEA" OR "Turkey"'
    enabled: true

  - name: Ashby — Turkey / EMEA Tech
    adapter_family: global_ats
    parser_key: ashby_board
    locale: en-EMEA
    language: [en]
    anti_duplication:
      canonical_source: "ashby"
      prefer_url_job_id: true
    query: 'site:jobs.ashbyhq.com "Software Engineer" OR "Data Engineer" OR "Product Manager" OR "Solutions Engineer" "EMEA" OR "Turkey"'
    enabled: true

  - name: Lever — EMEA Tech
    adapter_family: global_ats
    parser_key: lever_board
    locale: en-EMEA
    language: [en]
    anti_duplication:
      canonical_source: "lever"
      prefer_url_job_id: true
    query: 'site:jobs.lever.co "Backend Engineer" OR "Product Manager" OR "QA Engineer" OR "UX Designer" "EMEA" OR "Istanbul"'
    enabled: true

  - name: Workable — Turkey Tech
    adapter_family: global_ats
    parser_key: workable_board
    locale: en-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "workable"
      prefer_url_job_id: true
    query: 'site:apply.workable.com "Istanbul" OR "Türkiye" "Software Engineer" OR "Data Engineer" OR "Product Manager"'
    enabled: true

  - name: Teamtailor — Turkey / EMEA Tech
    adapter_family: global_ats
    parser_key: teamtailor_board
    locale: en-EMEA
    language: [en]
    anti_duplication:
      canonical_source: "teamtailor"
      prefer_url_job_id: true
    query: 'site:career.teamtailor.com OR site:jobs.teamtailor.com "Software" OR "Data" OR "Product" OR "Design" "EMEA" OR "Turkey"'
    enabled: true

  - name: letgo — Platform & Backend
    adapter_family: global_ats
    parser_key: lever_board
    locale: tr-TR
    language: [tr, en]
    anti_duplication:
      canonical_source: "lever"
      normalize_company_from_result: true
      prefer_url_job_id: true
      strip_title_suffixes: ["İstanbul", "Istanbul", "Turkey", "Hybrid"]
    query: 'site:jobs.lever.co/letgo "Platform Engineer" OR "System Engineer" OR "Backend Engineer" OR "Backend Developer" OR "Software Engineer" OR "Data Engineer"'
    enabled: true

