# Career-Ops Turkey Profile Configuration
# Copy this file to config/profile.yml for a Turkey-oriented locale starter.
# The Turkey starter is locale-aware, not role-specific. Replace the sample
# values below with your own identity, targets, and preferences.

candidate:
  full_name: "Deniz Kaya"
  email: "deniz@example.com"
  phone: "+90 555 000 00 00"
  location: "Istanbul, Turkiye"
  linkedin: "linkedin.com/in/denizkaya"
  portfolio_url: "https://example.dev"
  github: "github.com/denizkaya"
  twitter: "https://x.com/denizkaya"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Replace these with your real target roles.
  primary:
    - "Software Engineer"
    - "Product Manager"
  archetypes:
    - name: "Software / Backend Engineer"
      level: "Mid-Senior"
      fit: "primary"
    - name: "Data / Analytics Engineer"
      level: "Mid-Senior"
      fit: "secondary"
    - name: "Product / Program Manager"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  headline: "Technical professional building practical products and systems"
  exit_story: "Built hands-on experience across real-world technical work and now targeting roles with clear scope, ownership, and room to grow."
  superpowers:
    - "Structured problem solving"
    - "Turning ambiguity into working systems"
    - "Cross-functional communication"
  proof_points:
    - name: "Project or case study #1"
      url: "https://example.dev/project-1"
      hero_metric: "Replace with a real quantified result"
    - name: "Project or case study #2"
      url: "https://example.dev/project-2"
      hero_metric: "Replace with a second proof point"
  # dashboard:
  #   url: "https://example.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "<set-your-target-range>"
  currency: "TRY"
  minimum: "<set-your-minimum>"
  location_flexibility: "Update this with your city, remote, and relocation preferences"

  # Optional structured salary preferences. Keep or remove as needed.
  salary_preferences:
    TRY:
      target_min: 900000
      target_max: 1400000
      minimum: 750000
      period: "gross_annual"
    EUR:
      target_min: 30000
      target_max: 50000
      minimum: 25000
      period: "gross_annual"
    USD:
      target_min: 35000
      target_max: 60000
      minimum: 30000
      period: "gross_annual"

location:
  country: "Turkiye"
  city: "Istanbul"
  timezone: "Europe/Istanbul"
  visa_status: "Update with your work authorization status"

language:
  modes_dir: "modes/tr"
  cv_preferences:
    default: "en"
    supported:
      - "tr"
      - "en"
      - "es"
    by_listing_language:
      tr: "tr"
      en: "en"

location_preferences:
  preferred_cities:
    - "Istanbul"
    - "Ankara"
    - "Izmir"
  relocation_flexibility:
    willing: true
    scope: "within_turkey"
    notes: "Replace with your actual relocation policy."
  work_model_preference:
    priority_order:
      - "remote"
      - "hybrid"
      - "onsite"
    acceptable:
      - "remote"
      - "hybrid"
      - "onsite"

constraints:
  must_haves:
    - "Clear scope"
    - "Fair compensation"
  deal_breakers:
    - "Unpaid trial project"
    - "Misleading compensation process"
    - "Mandatory on-site requirement that conflicts with my real availability"

automation:
  application:
    auto_generate_pdf: true
    auto_generate_cover_letter: true
    auto_draft_form_answers: true
    auto_fill_easy_fields: false
    require_manual_review_before_submit: true
    follow_up_outreach: "manual_first"
