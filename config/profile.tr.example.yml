# Career-Ops Türkiye profil yapılandırması
# Türkiye odaklı başlangıç için bu dosyayı config/profile.yml olarak kopyalayın.
# Bu şablon role özel değildir; Türkiye lokali için hazırlanmış genel bir
# başlangıçtır. Aşağıdaki örnek değerleri kendi kimliğiniz, hedefleriniz ve
# tercihlerinizle değiştirin.

candidate:
  full_name: "Deniz Kaya"
  email: "deniz@example.com"
  phone: "+90 555 000 00 00"
  location: "İstanbul, Türkiye"
  linkedin: "linkedin.com/in/denizkaya"
  portfolio_url: "https://example.dev"
  github: "github.com/denizkaya"
  twitter: "https://x.com/denizkaya"
  # Opsiyonel: /career-ops pdf ile görsel CV üretimi için Canva tasarım ID'si.
  # canva_resume_design_id: "DAxxxxxxxxx"

target_roles:
  # Bunları gerçek hedef rollerinizle değiştirin.
  primary:
    - "Software Engineer"
    - "Product Manager"
  archetypes:
    - name: "Software / Backend Engineer"
      level: "Mid-Senior"
      fit: "primary"
    - name: "Data / Analytics Engineer"
      level: "Mid-Senior"
      fit: "secondary"
    - name: "Product / Program Manager"
      level: "Mid-Senior"
      fit: "adjacent"

narrative:
  headline: "Pratik ürünler ve sistemler geliştiren teknik profesyonel"
  exit_story: "Gerçek dünya teknik çalışmalarında uygulamalı deneyim kazandım; şimdi net kapsam, sahiplik ve gelişim alanı olan rolleri hedefliyorum."
  superpowers:
    - "Yapılandırılmış problem çözme"
    - "Belirsizliği çalışan sistemlere dönüştürme"
    - "Fonksiyonlar arası iletişim"
  proof_points:
    - name: "Proje veya vaka çalışması #1"
      url: "https://example.dev/project-1"
      hero_metric: "Gerçek ve ölçülebilir bir sonuçla değiştirin"
    - name: "Proje veya vaka çalışması #2"
      url: "https://example.dev/project-2"
      hero_metric: "İkinci kanıt noktasıyla değiştirin"
  # dashboard:
  #   url: "https://example.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "<hedef-aralığınızı-yazın>"
  currency: "TRY"
  minimum: "<minimum-beklentiniz>"
  location_flexibility: "Şehir, uzaktan çalışma ve taşınma tercihlerinizi yazın"

  # Opsiyonel yapılandırılmış maaş tercihleri. Gerekiyorsa tutun, değilse silin.
  salary_preferences:
    TRY:
      target_min: 900000
      target_max: 1400000
      minimum: 750000
      period: "gross_annual"
    EUR:
      target_min: 30000
      target_max: 50000
      minimum: 25000
      period: "gross_annual"
    USD:
      target_min: 35000
      target_max: 60000
      minimum: 30000
      period: "gross_annual"

location:
  country: "Türkiye"
  city: "İstanbul"
  timezone: "Europe/Istanbul"
  visa_status: "Çalışma izni / çalışma uygunluğu durumunuzu yazın"

language:
  modes_dir: "modes/tr"
  cv_preferences:
    default: "en"
    supported:
      - "tr"
      - "en"
      - "es"
    by_listing_language:
      tr: "tr"
      en: "en"

location_preferences:
  preferred_cities:
    - "İstanbul"
    - "Ankara"
    - "İzmir"
  relocation_flexibility:
    willing: true
    scope: "within_turkey"
    notes: "Gerçek taşınma politikanızı yazın."
  work_model_preference:
    priority_order:
      - "remote"
      - "hybrid"
      - "onsite"
    acceptable:
      - "remote"
      - "hybrid"
      - "onsite"

constraints:
  must_haves:
    - "Net rol kapsamı"
    - "Adil ücret"
  deal_breakers:
    - "Ücretsiz deneme projesi"
    - "Yanıltıcı ücret süreci"
    - "Gerçek uygunluğumla çelişen zorunlu ofis şartı"

automation:
  application:
    auto_generate_pdf: true
    auto_generate_cover_letter: true
    auto_draft_form_answers: true
    auto_fill_easy_fields: false
    require_manual_review_before_submit: true
    follow_up_outreach: "manual_first"
